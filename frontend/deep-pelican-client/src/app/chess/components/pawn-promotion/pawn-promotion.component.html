<div class="pawn-promotion-overlay">
  <div class="pawn-promotion-dialog">
    <h3>Choose a piece to promote your pawn to:</h3>
    <div class="piece-options">
      <button *ngFor="let type of ['queen', 'rook', 'bishop', 'knight']"
              (click)="selectPiece(type)"
              class="piece-button">
        <img [src]="getPieceImage(type)" [alt]="type" />
      </button>
    </div>
    <div >
      <button 
        class="cancel-button"
        (click)="cancelPromotion()"
        >
        Cancel
      </button>
  </div>
</div>
