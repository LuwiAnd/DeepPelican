<div class="chess-board">
  <!-- @for (row of chessBoardView; track $index; let y = $index) { -->
   @for (row of chessBoardView.slice().reverse(); track $index; let y = $index) {
    <div class="row">
      @for (piece of row; track $index; let x = $index) {
        <!-- <div class="square" [class.dark]="isDarkSquare(x, y)" [class.light]="!isDarkSquare(x, y)"> -->
        <div 
          class="square" 
          [ngClass]="{ 
            'dark-square': isDarkSquare(x, chessBoardView.length - y - 1), 
            'light-square': !isDarkSquare(x, chessBoardView.length - y - 1), 

            'selected-square': isSelectedSquare(x, chessBoardView.length - y - 1),
            'last-move-square': isLastMove(x, chessBoardView.length - y - 1),
            'checked-square': isCheckedSquare(x, chessBoardView.length - y - 1),
          }"
          (click)="selectSquare(x, chessBoardView.length - y - 1)"
          >

            <div [ngClass]="{
              'valid-move-indicator': isValidMove(x, chessBoardView.length - y - 1)
            }"></div>
          <!-- {{ (chessBoardView.length - y - 1) + ", " + x + ": " + cell }} -->
          <!-- <img *ngIf="piece" class="piece" [src]="pieceImagePaths[piece]" alt="{{ piece }}" /> -->
           @if (piece) {
            <img class="piece" [src]="pieceImagePaths[piece]" [alt]="piece" />
          }

        </div>
      }
    </div>
  }
</div>
