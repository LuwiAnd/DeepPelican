<div class="game-mode">
    <h1>Welcome to Deep Pelican Chess!</h1>
    <p>Choose a game mode to get started:</p>

    <div class="game-mode-buttons">

        <button 
            class="game-mode-button local-human-vs-human"
            (click)="startNewGame('local-human-vs-human')">

            <span>Local Human Game</span>

        </button>

        <button 
            class="game-mode-button online-game"
            (click)="startNewGame('online-human-vs-human')">

            <span>Online Human Game</span>

        </button>

        <button 
            class="game-mode-button human-vs-ai"
            (click)="startNewGame('human-vs-ai')">

            <span>Human vs AI</span>

        </button>

    </div>
</div>
