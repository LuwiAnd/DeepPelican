<div class="game-setup">
  <h1>Game Setup</h1>

  <ng-container *ngIf="isLocal()">
    <div class="setup-form">
      <h2>Local Human vs Human</h2>

      <div class="form-row">
        <div class="form-group">
            <label>White Player Time</label>
            <select [(ngModel)]="config.whiteTimeSeconds" name="whiteTime">
            <option *ngFor="let option of timeOptions" [ngValue]="option.seconds">
                {{ option.label }}
            </option>
            </select>
        </div>

        <div class="form-group">
            <label>Black Player Time</label>
            <select [(ngModel)]="config.blackTimeSeconds" name="blackTime">
            <option *ngFor="let option of timeOptions" [ngValue]="option.seconds">
                {{ option.label }}
            </option>
            </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>White Increment (0-10 seconds)</label>
          <input
            type="number"
            [(ngModel)]="config.whiteIncrementSeconds"
            name="whiteIncrement"
            min="0"
            max="10"
          />
        </div>

        <div class="form-group">
          <label>Black Increment (0-10 seconds)</label>
          <input
            type="number"
            [(ngModel)]="config.blackIncrementSeconds"
            name="blackIncrement"
            min="0"
            max="10"
          />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-cancel" (click)="onCancel()">Cancel</button>
        <button class="btn btn-start" (click)="onStart()">Start Game</button>
      </div>
    </div>

    
  </ng-container>

  <ng-container *ngIf="isOnline()">
    <div class="setup-form">
      <h2>Online Human vs Human</h2>

      <div class="form-group">
        <label>Game Time (Both Players)</label>
        <select
          [(ngModel)]="config.whiteTimeSeconds"
          (ngModelChange)="onWhiteTimeChangeOnline($event)"
          name="onlineTime"
        >
          <option *ngFor="let option of timeOptions" [ngValue]="option.seconds">
            {{ option.label }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Time Increment per Move (0-10 seconds, Both Players)</label>
        <input
          type="number"
          [(ngModel)]="config.whiteIncrementSeconds"
          (ngModelChange)="onWhiteIncrementChangeOnline($event)"
          name="onlineIncrement"
          min="0"
          max="10"
        />
      </div>
        <div class="form-actions">
            <button class="btn btn-cancel" (click)="onCancel()">Cancel</button>
            <button class="btn btn-start" (click)="onStart()">Start Game</button>
        </div>
    </div>

  </ng-container>

  <ng-container *ngIf="isHumanVsAi()">
    <div class="setup-form">
      <h2>Human vs AI</h2>

      <div class="player-toggle-row">

    <div class="player-toggle">
        <label>White Player</label>

        <button
        class="toggle-button"
        [class.active]="config.whitePlayerType === 'human'"
        (click)="config.whitePlayerType = 'human'">

        Human
        </button>

        <button
        class="toggle-button"
        [class.active]="config.whitePlayerType === 'ai'"
        (click)="config.whitePlayerType = 'ai'">

        AI
        </button>
    </div>

    <div class="player-toggle">
        <label>Black Player</label>

        <button
        class="toggle-button"
        [class.active]="config.blackPlayerType === 'human'"
        (click)="config.blackPlayerType = 'human'">

        Human
        </button>

        <button
        class="toggle-button"
        [class.active]="config.blackPlayerType === 'ai'"
        (click)="config.blackPlayerType = 'ai'">

        AI
        </button>
    </div>

    </div>
      <div class="form-row">
        <div class="form-group">
            <label>White's Time</label>
            <select [(ngModel)]="config.whiteTimeSeconds" name="whiteTime">
            <option *ngFor="let option of timeOptions" [ngValue]="option.seconds">
                {{ option.label }}
            </option>
            </select>
        </div>

        <div class="form-group">
            <label>Black's Time</label>
            <select [(ngModel)]="config.blackTimeSeconds" name="blackTime">
            <option *ngFor="let option of timeOptions" [ngValue]="option.seconds">
                {{ option.label }}
            </option>
            </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>White's Increment (0-10 seconds)</label>
          <input
            type="number"
            [(ngModel)]="config.whiteIncrementSeconds"
            name="whiteIncrement"
            min="0"
            max="10"
          />
        </div>

        <div class="form-group">
          <label>Black's Increment (0-10 seconds)</label>
          <input
            type="number"
            [(ngModel)]="config.blackIncrementSeconds"
            name="blackIncrement"
            min="0"
            max="10"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>AI Search Depth</label>
          <select [(ngModel)]="config.aiSearchDepth" name="aiSearchDepth">
            <option *ngFor="let depth of aiSearchDepthOptions" [ngValue]="depth">
              {{ depth }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>AI Model</label>
          <select [(ngModel)]="config.aiModel" name="aiModel">
            <option *ngFor="let model of aiModels" [ngValue]="model">
              {{ model }}
            </option>
          </select>
        </div>
      </div>
        <div class="form-actions">
            <button class="btn btn-cancel" (click)="onCancel()">Cancel</button>
            <button class="btn btn-start" (click)="onStart()">Start Game</button>
        </div>
    </div>
  </ng-container>

  
</div>
